<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Attendance Web</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Face Attendance System</h1>

      <section id="login-section" class="card">
        <h2>Login</h2>
        <form id="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" required />
          <label for="password">Password</label>
          <input id="password" type="password" required />
          <button type="submit">Sign In</button>
        </form>
        <p id="login-error" class="error hidden"></p>
      </section>

      <section id="app-section" class="hidden">
        <section class="card">
          <div class="row between center">
            <div>
              <h2 id="welcome-title">Welcome</h2>
              <p id="user-meta"></p>
            </div>
            <button id="logout-btn" class="secondary">Logout</button>
          </div>
        </section>

        <section id="admin-section" class="card hidden">
          <h2>Attendance</h2>
          <div class="session-grid">
            <div>
              <label for="session-date">Session Date</label>
              <input id="session-date" type="date" />
            </div>
          </div>

          <div class="row">
            <button id="mode-face-btn" class="secondary" type="button">Face Recognition Mode</button>
            <button id="mode-manual-btn" class="secondary" type="button">Manual Tick Mode</button>
          </div>

          <section id="face-mode" class="mode-block">
            <div class="camera-grid">
              <div>
                <video id="camera" autoplay playsinline class="preview hidden"></video>
                <img id="preview-image" class="preview hidden" alt="Selected frame preview" />
                <canvas id="capture-canvas" class="hidden"></canvas>
                <p id="scan-message" class="muted"></p>
              </div>
              <div class="actions">
                <button id="start-camera-btn" class="secondary" type="button">Show Camera</button>
                <button id="capture-btn" class="secondary" type="button">Capture & Scan</button>
                <label for="file-input" class="file-label">Or Upload Image</label>
                <input id="file-input" type="file" accept="image/*" />
                <button id="submit-face-btn" type="button">Submit Face Attendance</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Detected Student</th>
                  </tr>
                </thead>
                <tbody id="face-pending-body"></tbody>
              </table>
            </div>
          </section>

          <section id="manual-mode" class="mode-block hidden">
            <p class="muted">Tick present students and submit.</p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Present</th>
                    <th>Student Name</th>
                    <th>Email</th>
                  </tr>
                </thead>
                <tbody id="manual-body"></tbody>
              </table>
            </div>
            <button id="submit-manual-btn" type="button">Submit Manual Attendance</button>
          </section>

          <p id="batch-message"></p>
        </section>

        <section id="records-section" class="card hidden">
          <div class="row between center">
            <h2>Attendance Records</h2>
            <div class="row">
              <button id="refresh-records-btn" class="secondary" type="button">Refresh</button>
              <button id="export-btn" type="button">Export CSV</button>
              <button id="export-sheet-btn" type="button">Export Sheet</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="records-body"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/web/app.js"></script>
  </body>
</html>
